<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>kapli v0.1</title>
  
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="kapli v0.1">
  
  <!-- Icons -->
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Canvas for Animated Shader Theme -->
  <canvas id="bg-canvas" class="hidden"></canvas>

  <div class="app-container">
    <header>
      <h1>kapli v0.1</h1>
      <button id="settingsBtn" class="settings-btn" aria-label="Настройки">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <main>
      <div class="controls-section">
        <!-- Dose Selector -->
        <div class="dose-selector">
          <label class="dose-option">
            <input type="radio" name="dose" value="1" checked>
            <span class="dose-label">1 доза</span>
          </label>
          <label class="dose-option">
            <input type="radio" name="dose" value="2">
            <span class="dose-label">2 дозы</span>
          </label>
        </div>

        <!-- Main Action Button -->
        <button id="addDropBtn" class="primary-btn">
          <span class="btn-text">КАПНУЛ</span>
          <span class="btn-glow"></span>
        </button>

        <!-- Optional Comment -->
        <div class="comment-input-wrapper">
          <input type="text" id="comment" placeholder="Добавить комментарий (опц.)" autocomplete="off">
        </div>
      </div>

      <!-- History List -->
      <div class="history-section">
        <h2>История</h2>
        <div id="historyList" class="history-list">
          <div class="empty-state">Загрузка...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Настройки</h2>
        <button id="closeSettingsBtn" class="close-btn" aria-label="Закрыть">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-group">
          <label for="themeSelect">Тема оформления</label>
          <select id="themeSelect" class="settings-select">
            <option value="dark">Тёмная (Apple)</option>
            <option value="light">Светлая</option>
            <option value="animated">Анимированная (Эксперимент)</option>
          </select>
        </div>
        <div class="settings-group">
          <button id="exportCsvBtn" class="settings-action-btn">
            Экспорт истории (CSV)
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Confirmation Modal -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content confirm-content">
      <h3>Удаление записи</h3>
      <p>Вы уверены, что хотите удалить эту запись?</p>
      <div class="confirm-actions">
        <button id="cancelDeleteBtn" class="secondary-btn">Отмена</button>
        <button id="confirmDeleteBtn" class="danger-btn">Удалить</button>
      </div>
    </div>
  </div>

  <script src="shader.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
